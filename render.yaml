services:
  - type: web
    name: pimo-pro-industrial-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://industrial.pimo.pro
      # NÃO definir PORT — o Render injecta automaticamente process.env.PORT
