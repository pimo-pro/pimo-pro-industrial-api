services:
  - type: web
    name: pimo-pro-industrial-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://industrial.pimo.pro,https://pimo.pro,https://www.pimo.pro
      # Storage local efémero no free tier; migrar para disco pago com DATA_ROOT=/var/data/pimo-industrial
      - key: DATA_ROOT
        value: /opt/render/project/src/data
      # NÃO definir PORT — o Render injecta automaticamente process.env.PORT
